# Metadata about this component, to be used in the CMS
spec:
  structures:
    - content_blocks
    - extra_blocks
  label: "Upcoming Happening"
  description: Shows the very next upcoming happening (only shows one).
  icon:
  tags: [happenings, connected]
  tabbed: true

# Defines the structure of this component, as well as the default values
blueprint:
  _componentId: upcomingHappening-fecfa290-d5e0-49c4-ac0d-3fc71564856b
  contents:
    sectionId:
    showNote: true
    showCancelled: true
    tags:
    showCountdown: false
    whenLabel: "When:"
    showTime: true
    dateFormat: mm/dd/yyyy
    learnMoreText: "Learn more"
    noHappeningsHeading: bookshop:generic/heading
  styles:
    color_group: primary
    countDownPosition: center
    backgroundOpacity: 50

# Overrides any fields in the blueprint when viewing this component in the component browser
preview:

# Any extra CloudCannon inputs configuration to apply to the blueprint
_inputs:
  color_group:
    comment: >-
      This color group is applied to the No Happenings Heading.
  tags:
    hidden: false
    type: multiselect
    label: Filter by tags
    comment: >-
      Filter by specifc tags (set up in the happenings data file) to show only those happenings. Leave blank to show all.
      Make sure the tag you want to filter on is set up in the happenings data file.
    options:
      values: data.blogTags
  whenLabel:
    type: text
    label: When Label
    comment: >-
      The label text displayed above the event date (e.g. "When:", "Date:", "Starts:").
  showTime:
    type: switch
    label: Show Time
    comment: >-
      Toggle whether the time portion of the date is visible or hidden. When hidden, only the date is shown.
  dateFormat:
    type: choice
    label: Date Format
    options:
      allow_empty: false
      values:
        - mm/dd/yyyy
        - dd/mm/yyyy
        - yyyy/mm/dd
    comment: >-
      Choose the date display format.
  learnMoreText:
    type: text
    label: Learn More Text
    comment: >-
      The text for the link to the event's detail page (e.g. "Learn more", "View details", "Read more").
  noHappeningsHeading:
    label: No Happenings Heading
    comment: >-
      The heading to show when there are no happenings.
      If no heading is given, this section will be hidden when there are no happenings.
  backgroundOpacity:
    type: range
    options:
      min: 0
      max: 100
      step: 5
      default: 50
    comment: Set the opacity percentage of the background
  countDownPosition:
    hidden: true #'!showCountdown'
    type: choice
    options:
      allow_empty: false
      value_key: id
      values:
        - name: Left
          id: left
          icon: format_align_left
        - name: Right
          id: right
          icon: format_align_right
        - name: Center
          id: center
          icon: format_align_center